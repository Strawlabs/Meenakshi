<style>
        body {
            background-color: #faf9f6;
            margin: 0;
            overflow: hidden;
            font-family: 'Manrope', sans-serif;
        }

        .splash-gradient {
            background: radial-gradient(circle at center, #6b38d4 0%, #131b2e 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Ambient Breathing Effect */
        .ai-pulse {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(132, 85, 239, 0.3) 0%, rgba(132, 85, 239, 0) 70%);
            border-radius: 50%;
            animation: breath 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes breath {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 0.8; }
        }

        /* Glass Card for Content */
        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            transition: transform 0.3s ease;
        }

        .logo-animation {
            animation: logo-float 6s ease-in-out infinite;
        }

        @keyframes logo-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .fade-in {
            animation: fadeInUp 1.2s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-1 { animation-delay: 0.2s; }
        .stagger-2 { animation-delay: 0.4s; }
        .stagger-3 { animation-delay: 0.6s; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<!-- Loading Indicator / Progress -->
<div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden mb-8 fade-in stagger-3">
<div class="h-full bg-secondary-container w-0 transition-all duration-300 ease-out" id="progress-bar"></div>
</div>
<!-- Hint or Action -->
<div class="flex items-center gap-2 text-white/40 fade-in stagger-3">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">End-to-End Encrypted</span>
</div>
</div>
<!-- Atmospheric Elements -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-30">
<span class="material-symbols-outlined animate-bounce text-white">expand_more</span>
<span class="font-label-sm text-label-sm text-white uppercase tracking-[0.2em]">Intelligent Serenity</span>
</div>
</main>
<script>
        // Simple loading progress simulation
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // Add a subtle finish pulse
                    bar.classList.add('shadow-[0_0_10px_rgba(132,85,239,1)]');
                } else {
                    width += Math.random() * 15;
                    if (width > 100) width = 100;
                    bar.style.width = width + '%';
                }
            }, 300);
        });

        // Hover interaction for the glass card
        const glass = document.querySelector('.glass-container');
        glass.addEventListener('mousemove', (e) => {
            const rect = glass.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;
            
            glass.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
        });

        glass.addEventListener('mouseleave', () => {
            glass.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
        });
    </script>
